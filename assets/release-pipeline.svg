<svg width="1200" height="470" viewBox="0 0 1200 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mobile release pipeline</title>
  <desc id="desc">Professional mobile engineering pipeline showing code, tests, build, package, release, and users.</desc>
  <rect width="1200" height="470" rx="28" fill="#020617"/>
  <text x="56" y="66" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="32" font-weight="900">Build → Test → Release</text>
  <text x="56" y="100" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="17">A mobile workflow is only good when the release path is boring.</text>

  <g font-family="Inter, ui-sans-serif, system-ui" font-weight="800">
    <rect x="56" y="172" width="154" height="92" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="133" y="224" text-anchor="middle" fill="#F8FAFC" font-size="16">Code</text>
    <rect x="250" y="172" width="154" height="92" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="327" y="224" text-anchor="middle" fill="#F8FAFC" font-size="16">Typecheck</text>
    <rect x="444" y="172" width="154" height="92" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="521" y="224" text-anchor="middle" fill="#F8FAFC" font-size="16">Test</text>
    <rect x="638" y="172" width="154" height="92" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="715" y="224" text-anchor="middle" fill="#F8FAFC" font-size="16">Build</text>
    <rect x="832" y="172" width="154" height="92" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="909" y="224" text-anchor="middle" fill="#F8FAFC" font-size="16">Publish</text>
    <rect x="1026" y="172" width="118" height="92" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="1085" y="224" text-anchor="middle" fill="#F8FAFC" font-size="16">Users</text>
  </g>

  <path d="M210 218H250M404 218H444M598 218H638M792 218H832M986 218H1026" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  <circle r="6" fill="#A78BFA">
    <animateMotion dur="5s" repeatCount="indefinite" path="M133 312 H1085"/>
  </circle>
  <rect x="133" y="310" width="952" height="4" rx="2" fill="#1E293B"/>
  <rect x="133" y="310" width="160" height="4" rx="2" fill="#A78BFA">
    <animate attributeName="x" values="133;925;133" dur="5s" repeatCount="indefinite"/>
  </rect>

  <g font-family="SFMono-Regular, ui-monospace, Menlo, monospace">
    <text x="56" y="386" fill="#64748B" font-size="14">pipeline.status</text>
    <text x="212" y="386" fill="#22C55E" font-size="14">green</text>
    <text x="310" y="386" fill="#64748B" font-size="14">release.mode</text>
    <text x="452" y="386" fill="#38BDF8" font-size="14">measured</text>
    <text x="580" y="386" fill="#64748B" font-size="14">rollback</text>
    <text x="678" y="386" fill="#A78BFA" font-size="14">ready</text>
  </g>
</svg>
