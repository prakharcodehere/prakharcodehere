<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Open Source Control Room</title>
  <desc id="desc">Professional open-source dashboard for Prakhar Dubey's React Native packages and VS Code extension.</desc>
  <rect width="1200" height="560" rx="28" fill="#020617"/>
  <text x="56" y="66" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="32" font-weight="900">Open Source Control Room</text>
  <text x="56" y="100" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="17">Libraries and tools around React Native, mobile infrastructure, and developer workflow.</text>
  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="56" y="150" width="520" height="130" rx="18" fill="#0F172A" stroke="#334155"/>
    <text x="86" y="192" fill="#F8FAFC" font-size="20" font-weight="900">react-native-permit</text>
    <text x="86" y="226" fill="#94A3B8" font-size="14">Permission hooks, retries, onboarding, built-in UI, analytics, Jest mocks.</text>
    <text x="86" y="254" fill="#22C55E" font-size="13" font-weight="800">npm package</text>
    <rect x="624" y="150" width="520" height="130" rx="18" fill="#0F172A" stroke="#334155"/>
    <text x="654" y="192" fill="#F8FAFC" font-size="20" font-weight="900">react-native-screen-system</text>
    <text x="654" y="226" fill="#94A3B8" font-size="14">Keyboard, focus, scroll, safe-area, and screen state primitives.</text>
    <text x="654" y="254" fill="#38BDF8" font-size="13" font-weight="800">npm package</text>
    <rect x="56" y="320" width="520" height="130" rx="18" fill="#0F172A" stroke="#334155"/>
    <text x="86" y="362" fill="#F8FAFC" font-size="20" font-weight="900">react-native-nazar</text>
    <text x="86" y="396" fill="#94A3B8" font-size="14">Device performance, hardware specs, and mobile benchmark utilities.</text>
    <text x="86" y="424" fill="#A78BFA" font-size="13" font-weight="800">react native library</text>
    <rect x="624" y="320" width="520" height="130" rx="18" fill="#0F172A" stroke="#334155"/>
    <text x="654" y="362" fill="#F8FAFC" font-size="20" font-weight="900">code-is-crying</text>
    <text x="654" y="396" fill="#94A3B8" font-size="14">A VS Code extension that reacts when your terminal fails.</text>
    <text x="654" y="424" fill="#F472B6" font-size="13" font-weight="800">VS Code extension</text>
  </g>
  <rect x="56" y="500" width="1088" height="2" fill="#1E293B"/>
  <rect x="56" y="500" width="220" height="2" fill="#A78BFA">
    <animate attributeName="x" values="56;924;56" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
