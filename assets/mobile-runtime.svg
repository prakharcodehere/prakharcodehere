<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">React Native Runtime Map</title>
  <desc id="desc">Dark technical React Native runtime map showing UI thread, JS thread, Hermes, JSI, and native APIs.</desc>
  <rect width="1200" height="520" rx="28" fill="#020617"/>
  <text x="56" y="66" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="32" font-weight="900">React Native Runtime Map</text>
  <text x="56" y="100" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="17">How I think about smooth mobile apps: keep the user path short, measured, and native-aware.</text>
  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="56" y="156" width="220" height="120" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="86" y="198" fill="#F8FAFC" font-size="18" font-weight="800">UI Thread</text>
    <text x="86" y="230" fill="#94A3B8" font-size="14">gestures, layout, frames</text>
    <rect x="336" y="156" width="220" height="120" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="366" y="198" fill="#F8FAFC" font-size="18" font-weight="800">JS Thread</text>
    <text x="366" y="230" fill="#94A3B8" font-size="14">state, events, orchestration</text>
    <rect x="616" y="156" width="220" height="120" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="646" y="198" fill="#F8FAFC" font-size="18" font-weight="800">Hermes + JSI</text>
    <text x="646" y="230" fill="#94A3B8" font-size="14">fast runtime, direct calls</text>
    <rect x="896" y="156" width="248" height="120" rx="16" fill="#0F172A" stroke="#334155"/>
    <text x="926" y="198" fill="#F8FAFC" font-size="18" font-weight="800">Native Layer</text>
    <text x="926" y="230" fill="#94A3B8" font-size="14">Kotlin, Swift, TurboModules</text>
  </g>
  <g stroke="#38BDF8" stroke-width="3" stroke-linecap="round">
    <path d="M276 216H336"/>
    <path d="M556 216H616"/>
    <path d="M836 216H896"/>
  </g>
  <rect x="166" y="342" width="854" height="4" rx="2" fill="#1E293B"/>
  <rect x="166" y="342" width="190" height="4" rx="2" fill="#A78BFA">
    <animate attributeName="x" values="166;830;166" dur="3.8s" repeatCount="indefinite"/>
  </rect>
  <circle r="6" fill="#A78BFA">
    <animateMotion dur="3.8s" repeatCount="indefinite" path="M166 344 H1020"/>
  </circle>
  <g font-family="SFMono-Regular, ui-monospace, Menlo, monospace">
    <text x="56" y="420" fill="#64748B" font-size="14">frame_budget_ms</text>
    <text x="210" y="420" fill="#22C55E" font-size="14">16.67</text>
    <text x="336" y="420" fill="#64748B" font-size="14">renderer</text>
    <text x="430" y="420" fill="#38BDF8" font-size="14">fabric</text>
    <text x="536" y="420" fill="#64748B" font-size="14">bridge</text>
    <text x="610" y="420" fill="#A78BFA" font-size="14">jsi</text>
    <text x="690" y="420" fill="#64748B" font-size="14">engine</text>
    <text x="770" y="420" fill="#F8FAFC" font-size="14">hermes</text>
  </g>
</svg>
